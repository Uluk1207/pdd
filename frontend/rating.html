<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Рейтинг — ПДД Онлайн</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body>
<nav class="navbar">
  <a href="index.html" class="nav-logo"><div class="logo-icon">🚗</div>ПДД Онлайн</a>
  <ul class="nav-menu">
    <li><a href="index.html">Главная</a></li>
    <li><a href="tickets.html">Билеты</a></li>
    <li><a href="stats.html">Статистика</a></li>
    <li><a href="rating.html" class="active">Рейтинг</a></li>
  </ul>
  <div class="nav-right" id="navAuth"></div>
  <button class="hamburger" onclick="toggleMenu()"><span></span><span></span><span></span></button>
</nav>
<div class="mobile-menu" id="mobileMenu"><a href="index.html">🏠 Главная</a></div>

<div class="container" style="padding:40px 24px;max-width:700px">
  <div class="section-title">🏆 Рейтинг <span>пользователей</span></div>
  <div id="ratingList"><div class="loader">⟳</div></div>
</div>

<div class="toast-container" id="toastContainer"></div>
<script src="js/app.js"></script>
<script>
initNav();
document.addEventListener('DOMContentLoaded', async () => {
  const el = document.getElementById('ratingList');
  try {
    const data = await api('/stats/rating');
    if (!data.length) {
      el.innerHTML = '<div class="empty-state"><div class="empty-icon">🏆</div><h3>Рейтинг пуст</h3><p>Будьте первым!</p></div>';
      return;
    }
    const medals = ['🥇','🥈','🥉'];
    el.innerHTML = data.map((u, i) => `
      <div class="rating-item">
        <div class="rating-rank ${i<3?'top'+(i+1):''}">${medals[i] || i+1}</div>
        <div class="rating-avatar">${u.name.charAt(0).toUpperCase()}</div>
        <div class="rating-info">
          <div class="r-name">${u.name}</div>
          <div class="r-sub">${u.total_tests} тестов · ${u.avg_score}% средний балл</div>
        </div>
        <div class="rating-score">${u.best_score}%</div>
      </div>`).join('');
  } catch(e) { el.innerHTML = `<div class="alert alert-danger">⚠️ ${e.message}</div>`; }
});
</script>
</body>
</html>
